name: EAS Build

on:
  workflow_dispatch:
    inputs:
      platform:
        description: Plateforme à compiler
        type: choice
        options:
          - all
          - ios
          - android
        default: all
      profile:
        description: Profil EAS
        type: choice
        options:
          - production
          - preview
        default: production
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build & submit (iOS + Android)
        run: >-
          eas build
          --platform ${{ inputs.platform || 'all' }}
          --profile ${{ inputs.profile || 'production' }}
          ${{ (inputs.profile || 'production') == 'production' && '--auto-submit' || '' }}
          --non-interactive
          --no-wait
